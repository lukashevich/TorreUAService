name: TorreUA Pipeline

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: torreua-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          MAX_POSTS_PER_RUN: "2"
          STATE_FILE: state.json
        run: python run_pipeline.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "Update state.json [skip ci]"
          if ! git pull --rebase origin main; then
            python -c '
import json
import subprocess
from pathlib import Path

def load_version(spec: str) -> dict:
    raw = subprocess.check_output(["git", "show", spec], text=True)
    return json.loads(raw)

upstream = load_version(":2:state.json")
current = load_version(":3:state.json")

merged_urls = list(
    dict.fromkeys(
        upstream.get("posted_urls", []) + current.get("posted_urls", [])
    )
)[-500:]

candidates = [value for value in [upstream.get("last_run"), current.get("last_run")] if value]
last_run = max(candidates) if candidates else None

merged = {
    "posted_urls": merged_urls,
    "last_run": last_run,
}

Path("state.json").write_text(
    json.dumps(merged, ensure_ascii=False, indent=2) + "\n",
    encoding="utf-8",
)
'
            git add state.json
            GIT_EDITOR=true git rebase --continue
          fi
          git push origin HEAD:main
